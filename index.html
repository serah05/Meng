<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Tulip Bouquet</title>
    <style>
        /* --- General Layout --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 1.5s ease, color 1.5s ease;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        /* --- Background Hearts --- */
        .heart {
            position: absolute;
            color: #ff5252;
            opacity: 0;
            animation: floatHeart 6s infinite ease-in-out;
            z-index: 0;
            font-size: 20px;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- Light/Dark Mode Styles --- */
        body.light-mode {
            background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
            color: #5d4037;
        }

        body.warm-mode {
            background: linear-gradient(to bottom, #2c1e1e, #4a2c2a);
            color: #ffccbc;
        }

        /* The Glow Effect */
        .glow-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 70%, rgba(255, 105, 180, 0.3) 0%, rgba(0,0,0,0) 60%);
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 0;
        }

        body.warm-mode .glow-overlay { opacity: 1; }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            opacity: 0;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* --- The Scene Container --- */
        .scene {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        /* --- The Vase --- */
        .vase {
            width: 90px;
            height: 110px;
            background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 10px 10px 45px 45px;
            position: relative;
            margin-top: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(8px);
        }

        /* Ribbon on vase */
        .vase::after {
            content: '';
            position: absolute;
            top: 40px;
            left: -10px;
            width: 110px;
            height: 15px;
            background: #ff4081;
            border-radius: 5px;
            z-index: -1;
        }

        /* --- The Flowers --- */
        .flower-container {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
        }

        .stem {
            width: 3px;
            height: 140px;
            background-color: #388e3c;
            position: relative;
            transform-origin: bottom center;
            animation: gentleSway 4s infinite ease-in-out alternate;
        }

        .stem:nth-child(1) { animation-delay: 0s; height: 120px; }
        .stem:nth-child(2) { animation-delay: 0.7s; height: 150px; }
        .stem:nth-child(3) { animation-delay: 1.4s; height: 130px; }
        .stem:nth-child(4) { animation-delay: 2.1s; height: 160px; }
        .stem:nth-child(5) { animation-delay: 0.5s; height: 110px; }

        .head {
            width: 28px;
            height: 32px;
            background: linear-gradient(to top, #d32f2f, #ff5252);
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2);
        }

        .head::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        .leaf {
            width: 18px;
            height: 45px;
            background-color: #4caf50;
            border-radius: 0 20px 0 20px;
            position: absolute;
            bottom: 25px;
        }
        .leaf.left { left: -12px; transform: rotate(-15deg); }
        .leaf.right { right: -12px; transform: rotate(15deg) scaleX(-1); }

        /* --- Controls --- */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            align-items: center;
        }

        .button-row {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button:hover { transform: translateY(-2px); }
        button:active { transform: scale(0.95); }

        #lightSwitch {
            background-color: #ff7043;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 112, 67, 0.4);
        }
        
        #messageBtn {
            background-color: #ab47bc;
            color: white;
            box-shadow: 0 4px 15px rgba(171, 71, 188, 0.4);
        }

        body.warm-mode #lightSwitch {
            background-color: #5d4037;
            color: #ffccbc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        body.warm-mode #messageBtn {
            background-color: #4a148c;
            color: #e1bee7;
        }

        /* --- Sweet Message Popup --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-content h2 {
            color: #e91e63;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            font-style: italic;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            box-shadow: none;
            transform: none;
        }
        
        .close-btn:hover { color: #e91e63; }

        /* Rose Petals in modal */
        .petals {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* --- Animations --- */
        @keyframes gentleSway {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

    </style>
</head>
<body class="light-mode">

    <div class="glow-overlay"></div>

    <!-- Floating Hearts -->
    <div class="heart" style="left: 10%; animation-duration: 5s;">❤️</div>
    <div class="heart" style="left: 30%; animation-duration: 7s; animation-delay: 1s;">💕</div>
    <div class="heart" style="left: 70%; animation-duration: 6s; animation-delay: 2s;">💗</div>
    <div class="heart" style="left: 85%; animation-duration: 8s; animation-delay: 0.5s;">💖</div>
    <div class="heart" style="left: 50%; animation-duration: 9s; animation-delay: 3s;">💘</div>

    <!-- Sparkles -->
    <div class="sparkle" style="top: 20%; left: 20%; animation-delay: 0s;"></div>
    <div class="sparkle" style="top: 40%; left: 80%; animation-delay: 0.5s;"></div>
    <div class="sparkle" style="top: 60%; left: 10%; animation-delay: 1s;"></div>

    <div class="scene">
        <div class="flower-container">
            <div class="stem">
                <div class="head" style="background: linear-gradient(to top, #c2185b, #ff80ab);"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
            <div class="stem">
                <div class="head" style="background: linear-gradient(to top, #d32f2f, #ff5252);"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
            <div class="stem">
                <div class="head" style="background: linear-gradient(to top, #b71c1c, #ff1744);"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
            <div class="stem">
                <div class="head" style="background: linear-gradient(to top, #c2185b, #ff80ab);"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
            <div class="stem">
                <div class="head" style="background: linear-gradient(to top, #d32f2f, #ff5252);"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>
            </div>
        </div>
        <div class="vase"></div>
    </div>

    <!-- Sweet Message Modal -->
    <div class="modal-overlay" id="sweetModal" onclick="closeModal(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModalBtn()">✕</button>
            <div class="petals">🌹💐🌷</div>
            <h2>My Dearest Love,</h2>
            <p id="sweetText">Hi Babyyyy, i miss you so much. It's been long since gumawa ako ng ganito ahehe, daming events na natin yung nalagpasan ko na di nagawa nito. Ni ta try ko lang ulit gumawa for you ahehe, I love you so muchh bub. 💕</p>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="button-row">
            <button id="lightSwitch" onclick="toggleLight()">🌙 Evening Mode</button>
        </div>
        
        <div class="button-row">
            <button id="messageBtn" onclick="showSweetMessage()">💌 Open for Sweet Message</button>
        </div>
    </div>

    <script>
        function toggleLight() {
            const body = document.body;
            const btn = document.getElementById('lightSwitch');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                body.classList.add('warm-mode');
                btn.innerText = "☀️ Morning Mode";
            } else {
                body.classList.remove('warm-mode');
                body.classList.add('light-mode');
                btn.innerText = "🌙 Evening Mode";
            }
        }

        function showSweetMessage() {
            const modal = document.getElementById('sweetModal');
            modal.classList.add('show');
        }

        function closeModal(event) {
            // Close when clicking outside the modal content
            if (event.target.classList.contains('modal-overlay')) {
                document.getElementById('sweetModal').classList.remove('show');
            }
        }

        function closeModalBtn() {
            document.getElementById('sweetModal').classList.remove('show');
        }
    </script>
</body>
</html>
